[build]
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 600
startCommand = "sh -c 'streamlit run app.py --server.port=${PORT} --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false --server.fileWatcherType=none'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
